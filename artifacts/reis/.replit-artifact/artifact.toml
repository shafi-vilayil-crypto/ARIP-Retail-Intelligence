kind = "web"
previewPath = "/"
title = "Retail Expansion Intelligence System"
version = "1.0.0"
id = "artifacts/reis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24796

[services.development]
run = "pnpm --filter @workspace/reis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reis", "run", "build" ]
publicDir = "artifacts/reis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24796"
BASE_PATH = "/"
